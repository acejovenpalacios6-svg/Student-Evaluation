<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Evaluation</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#190df5">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#2ff757,#07f197);
    height:100vh;
}
</style>

</head>
<body class="d-flex justify-content-center align-items-center">

<div class="card shadow p-4" style="width:350px;">
    
    <h3 class="text-center mb-3">Student Evaluation</h3>
    <input type="text" id="studentName" class="form-control mb-2" placeholder="Enter Student Name">
    <input type="text" id="teacherName" class="form-control mb-2" placeholder="Enter Teacher Name">
    <input type="number" id="grade" class="form-control mb-3" placeholder="Enter Grade">
    <button onclick="checkGrade()" class="btn btn-primary w-100">
        Check Grade
    </button>

    <h5 id="gradeResult" class="mt-3 text-center"></h5>

</div>

<script>
function checkGrade() {
    let student = document.getElementById("studentName").value;
    let teacher = document.getElementById("teacherName").value;
    let grade = parseInt(document.getElementById("grade").value);

    let result = "";
    if (grade <= 80) {
        result = "Failed";
    } else {
        result = "Passed";
    }

    document.getElementById("gradeResult").innerText =
    "Student: " + student +
    " | Teacher: " + teacher +
    " | Grade: " + grade +
    " | Result: " + result;
}
</script>

</body>
</html>
